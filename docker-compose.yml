services:
  arcadedb:
    image: arcadedata/arcadedb:latest
    ports: ["2480:2480", "2424:2424"]
    environment:
      JAVA_OPTS: >-
        -Darcadedb.server.rootPassword=ChangeMe123!
        -Xmx2g
    volumes: ["arcadedb_data:/home/arcadedb/databases"]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:2480/api/v1/ready"]
      interval: 10s
      timeout: 5s
      retries: 6

  chroma:
    # pinned to match the chromadb client in requirements.txt (0.4.24)
    image: ghcr.io/chroma-core/chroma:0.4.24
    ports: ["8000:8000"]
    volumes: ["chroma_data:/chroma/chroma"]

  ollama:
    image: ollama/ollama
    ports: ["11434:11434"]
    volumes: ["ollama_models:/root/.ollama"]
    # For GPU, uncomment:
    # deploy:
    #   resources:
    #     reservations:
    #       devices: [{driver: nvidia, count: 1, capabilities: [gpu]}]

  backend:
    build: ./backend
    ports: ["8001:8000"]
    environment:
      ARCADEDB_URL: "http://arcadedb:2480"
      ARCADEDB_DATABASE: "codebase"
      ARCADEDB_USER: "root"
      ARCADEDB_PASSWORD: "ChangeMe123!"
      CHROMA_HOST: "chroma"
      CHROMA_PORT: "8000"
      OLLAMA_URL: "http://ollama:11434"
      OLLAMA_MODEL: "mistral"
      CORS_ORIGINS: "http://localhost:3000"
    depends_on:
      arcadedb:
        condition: service_healthy
      chroma:
        condition: service_started
      ollama:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        # NEXT_PUBLIC_* is baked at build time; the browser hits the host-mapped
        # backend port, not the docker-network name.
        NEXT_PUBLIC_API_URL: "http://localhost:8001"
    ports: ["3000:3000"]
    depends_on: [backend]

volumes:
  arcadedb_data:
  chroma_data:
  ollama_models:
