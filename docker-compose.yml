services:
  app:
    build: .
    image: codebase-intelligence
    ports:
      - "8500:8500"
    volumes:
      # Mount the code you want to analyze at /data (use the path box: "/data/<repo>").
      - ./:/data:ro
    environment:
      # Point at a local Ollama for AI explanations (optional). Both LLM clients
      # honour LLM_BASE_URL / LLM_MODEL; the /v1 suffix is fine for either (the
      # native client strips it, the OpenAI-compatible client keeps it).
      # host.docker.internal reaches an Ollama running on the host (see below).
      LLM_BASE_URL: "http://host.docker.internal:11434/v1"
      LLM_MODEL: "qwen2.5-coder:7b"
      # Relational metadata store (users, jobs, repos, audit log). Omit this to
      # fall back to a local SQLite file (single-node dev).
      DATABASE_URL: "postgresql+psycopg2://codeintel:codeintel@db:5432/codeintel"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy

  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: codeintel
      POSTGRES_PASSWORD: codeintel
      POSTGRES_DB: codeintel
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U codeintel -d codeintel"]
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  arcadedb:
    image: arcadedata/arcadedb:latest
    ports:
      - "2480:2480"
      - "2424:2424"
    environment:
      JAVA_OPTS: "-Xmx2g"
      arcadedb.server.rootPassword: "${ARCADEDB_PASSWORD:-ChangeMe123!}"
    volumes:
      - arcadedata:/home/arcadedb/databases
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:2480/api/v1/ready >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20

  chroma:
    image: ghcr.io/chroma-core/chroma:latest
    ports:
      - "8003:8000"
    volumes:
      - chromadata:/chroma/chroma

  # Object storage for uploaded repo archives (S3-compatible, self-hosted, no
  # usage caps). The backend/worker use it when MINIO_ENDPOINT is set; otherwise
  # they fall back to the local filesystem (single-node dev). Console on :9001.
  minio:
    image: minio/minio
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_ROOT_PASSWORD: "${MINIO_SECRET_KEY:-minioadmin}"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 10

  # FastAPI ingestion/query API. Runs DB migrations on boot, then serves.
  backend:
    build: ./backend
    image: codebase-intelligence-api
    command: sh -c "until alembic upgrade head; do echo 'waiting for db, retrying in 2s...'; sleep 2; done && uvicorn main:app --host 0.0.0.0 --port 8000"
    ports:
      - "8001:8000"
    volumes:
      # Persist cloned/ingested repo checkouts (REPO_CLONE_DIR) across rebuilds.
      - backend_data:/app/data
    environment:
      DATABASE_URL: "postgresql+psycopg2://codeintel:codeintel@db:5432/codeintel"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_TASK_ALWAYS_EAGER: "false"
      # Strong random secret for JWT signing — override in prod.
      AUTH_SECRET: "${AUTH_SECRET:-change-me-in-prod}"
      # GitHub OAuth (optional; free OAuth App from github.com/settings/developers).
      # Leave blank to hide the "Continue with GitHub" button.
      GITHUB_CLIENT_ID: "${GITHUB_CLIENT_ID:-}"
      GITHUB_CLIENT_SECRET: "${GITHUB_CLIENT_SECRET:-}"
      # Where the OAuth callback redirects the browser after sign-in.
      FRONTEND_URL: "${FRONTEND_URL:-http://localhost:3100}"
      BACKEND_URL: "${BACKEND_URL:-http://localhost:8001}"
      # Set API_KEY to require X-API-Key on data routes (service-to-service).
      # Object storage for uploaded archives (omit to use the local filesystem).
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      ARCADEDB_URL: "http://arcadedb:2480"
      ARCADEDB_PASSWORD: "${ARCADEDB_PASSWORD:-ChangeMe123!}"
      CHROMA_HOST: "chroma"
      CHROMA_PORT: "8000"
      LLM_BASE_URL: "http://host.docker.internal:11434/v1"
      LLM_MODEL: "qwen2.5-coder:7b"
      # Embedding token window per chunk (lower = faster ingest). See .env.example.
      EMBED_MAX_TOKENS: "${EMBED_MAX_TOKENS:-256}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      arcadedb:
        condition: service_healthy
      chroma:
        condition: service_started

  # Celery worker: durable execution of ingestion jobs (same image as backend).
  worker:
    build: ./backend
    image: codebase-intelligence-api
    command: celery -A celery_app worker --loglevel=info
    volumes:
      - backend_data:/app/data
    environment:
      DATABASE_URL: "postgresql+psycopg2://codeintel:codeintel@db:5432/codeintel"
      CELERY_BROKER_URL: "redis://redis:6379/0"
      CELERY_TASK_ALWAYS_EAGER: "false"
      MINIO_ENDPOINT: "minio:9000"
      MINIO_ACCESS_KEY: "${MINIO_ACCESS_KEY:-minioadmin}"
      MINIO_SECRET_KEY: "${MINIO_SECRET_KEY:-minioadmin}"
      ARCADEDB_URL: "http://arcadedb:2480"
      ARCADEDB_PASSWORD: "${ARCADEDB_PASSWORD:-ChangeMe123!}"
      CHROMA_HOST: "chroma"
      CHROMA_PORT: "8000"
      LLM_BASE_URL: "http://host.docker.internal:11434/v1"
      LLM_MODEL: "qwen2.5-coder:7b"
      # Embedding token window per chunk (lower = faster ingest). See .env.example.
      EMBED_MAX_TOKENS: "${EMBED_MAX_TOKENS:-256}"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
      arcadedb:
        condition: service_healthy
      chroma:
        condition: service_started

  # Next.js UI. NEXT_PUBLIC_API_URL is baked in at build time (client-side
  # code can't read runtime env vars), so it must point at the host-mapped
  # backend port, not the in-network service name.
  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL:-http://localhost:8001}"
    image: codebase-intelligence-frontend
    ports:
      - "3100:3000"
    depends_on:
      - backend

  # By default this stack expects Ollama on the *host* (reached via
  # host.docker.internal above). To run Ollama in-compose instead, uncomment the
  # service below and point LLM_BASE_URL at "http://ollama:11434/v1".
  # ollama:
  #   image: ollama/ollama
  #   ports: ["11434:11434"]
  #   volumes: ["ollama:/root/.ollama"]

volumes:
  pgdata:
  miniodata:
  arcadedata:
  chromadata:
  backend_data:
#   ollama:
