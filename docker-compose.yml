services:
  app:
    build: .
    image: codebase-intelligence
    ports:
      - "8500:8500"
    volumes:
      # Mount the code you want to analyze at /data (use the path box: "/data/<repo>").
      - ./:/data:ro
    environment:
      # Point at a local Ollama for AI explanations (optional).
      LLM_BASE_URL: "http://host.docker.internal:11434/v1"
      LLM_MODEL: "qwen2.5-coder:7b"
    extra_hosts:
      - "host.docker.internal:host-gateway"

  # Optional: run a local LLM alongside. Uncomment to enable.
  # ollama:
  #   image: ollama/ollama
  #   ports: ["11434:11434"]
  #   volumes: ["ollama:/root/.ollama"]
# volumes:
#   ollama:
